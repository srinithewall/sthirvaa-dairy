name: Debug AWS Server
on:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/debug-server.yml'

permissions:
  contents: write

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: SSH and Read Logs natively
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > private_key.pem
          chmod 600 private_key.pem
          ssh -i private_key.pem -o StrictHostKeyChecking=no ubuntu@43.204.221.192 "
            echo '=== PORTS ==='
            sudo netstat -tulpn || netstat -tulpn || ss -tulpn
            echo '=== NGINX ==='
            sudo cat /etc/nginx/sites-enabled/* || cat /etc/nginx/sites-enabled/*
            echo '=== DOCKER LOGS ==='
            docker logs dairy-ui --tail=50
            echo '=== PROCESSES ==='
            ps -ef | grep node
          " > debug-output.txt
          rm -f private_key.pem

      - name: Commit and Push Debug File
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          mv debug-output.txt dairy-ui/debug-output.txt
          git add dairy-ui/debug-output.txt
          git commit -m "ci: Update AWS debug logs [skip ci]" || echo "No changes"
          git push
