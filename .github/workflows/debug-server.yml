name: Debug AWS Server
on:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/debug-server.yml'

permissions:
  contents: write

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: SSH and Debug
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 43.204.221.192
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "=== DOCKER CONTAINERS ===" > ~/debug-output.txt
            docker ps -a >> ~/debug-output.txt
            echo "=== PM2 PROCESSES ===" >> ~/debug-output.txt
            if command -v pm2 &> /dev/null; then
              pm2 list >> ~/debug-output.txt
            else
              echo "pm2 not found" >> ~/debug-output.txt
            fi
            echo "=== LISTENING PORTS ===" >> ~/debug-output.txt
            sudo netstat -tulpn >> ~/debug-output.txt || netstat -tulpn >> ~/debug-output.txt || ss -tulpn >> ~/debug-output.txt
            echo "=== DOCKER COMPOSE STATUS ===" >> ~/debug-output.txt
            cd ~/dairy-deployment
            docker compose ps >> ~/debug-output.txt
            echo "=== DOCKER COMPOSE LOGS ===" >> ~/debug-output.txt
            docker compose logs --tail=100 ui >> ~/debug-output.txt
            echo "=== LOCAL SYSTEMD OR SERVICE ===" >> ~/debug-output.txt
            systemctl list-units --type=service | grep -i 'dairy' >> ~/debug-output.txt || echo "No systemd service" >> ~/debug-output.txt

      - name: Download Debug Output from Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 43.204.221.192
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "/home/ubuntu/debug-output.txt"
          target: "."

      - name: Commit and Push Debug File
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          mv debug-output.txt dairy-ui/debug-output.txt
          git add dairy-ui/debug-output.txt
          git commit -m "ci: Update AWS debug logs [skip ci]" || echo "No changes"
          git push
