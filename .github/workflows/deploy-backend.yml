name: Deploy Backend to AWS

on:
  push:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'pom.xml'
      - 'Dockerfile'
      - 'docker-compose.yml'
      - '.github/workflows/deploy-backend.yml'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/dairy-backend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-package: jdk
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Deploy to AWS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 43.204.221.192
          username: ubuntu # Change to 'ec2-user' if it's an Amazon Linux instance
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Create a directory for the project if it doesn't exist
            mkdir -p ~/dairy-deployment
            cd ~/dairy-deployment
            
            # Download the latest docker-compose file from the repo 
            # (In a real setup, we'd use curl or scp, but here we just echo the content for simplicity/ensuring accuracy)
            cat <<EOF > docker-compose.yml
            version: '3.8'
            services:
              app:
                image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
                container_name: dairy-backend
                environment:
                  - DB_URL=${{ secrets.DB_URL }}
                  - DB_USER=${{ secrets.DB_USER }}
                  - DB_PASSWORD=${{ secrets.DB_PASSWORD }}
                  - JWT_SECRET=${{ secrets.JWT_SECRET }}
                restart: always
                network_mode: "host"
            EOF
            
            # Authenticate Docker to GHCR
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin
            
            # Pull the new image and restart the container
            docker compose pull
            docker compose up -d
            
            # Cleanup old images
            docker image prune -f
