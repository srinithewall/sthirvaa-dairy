name: Deploy Frontend to AWS

on:
  push:
    branches: [ main ]
    paths:
      - 'dairy-ui/**'
      - '.github/workflows/deploy-frontend.yml'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/dairy-ui

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './dairy-ui/package-lock.json'

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./dairy-ui
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Deploy to AWS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 43.204.221.192
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            mkdir -p ~/dairy-deployment
            cd ~/dairy-deployment
            
            # Update the full docker-compose file
            cat <<EOF > docker-compose.yml
            version: '3.8'
            services:
              app:
                image: ${{ env.REGISTRY }}/${{ github.repository_owner }}/dairy-backend:latest
                container_name: dairy-backend
                environment:
                  - DB_URL=${{ secrets.DB_URL }}
                  - DB_USER=${{ secrets.DB_USER }}
                  - DB_PASSWORD=${{ secrets.DB_PASSWORD }}
                  - JWT_SECRET=${{ secrets.JWT_SECRET }}
                restart: always
                network_mode: "host"

              ui:
                image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
                container_name: dairy-ui
                restart: always
                network_mode: "host"
            EOF
            
            # Authenticate Docker to GHCR
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin
            
            # Pull the new image and restart the UI container
            docker compose pull ui
            docker compose up -d ui
            
            docker image prune -f
