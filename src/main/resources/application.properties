spring.application.name=DairyManagementSystem
server.port=8080

# Database Configuration
spring.datasource.url=${DB_URL:jdbc:mysql://43.204.221.192:3306/dairy?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USER:sthi}
spring.datasource.password=${DB_PASSWORD:Sthirva@26}

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT and Security
jwt.secret=${JWT_SECRET:DairySecretKeyForJwtAuthenticationWhichShouldBeLongEnoughToAvoidErrors}
app.jwtSecret=${jwt.secret}
jwt.expirationMs=86400000

# Proxy / Forwarded Headers support
server.forward-headers-strategy=framework

# Logging
logging.level.com.dairy=DEBUG
logging.level.org.springframework.security=INFO

